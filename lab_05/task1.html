<!DOCTYPE html>
<html>
<head>
  <title>Task 1 - Basic Calculator</title>
  <style>
    
    body {
      font-family: Arial, sans-serif; 
      background-color: #f0f4ff;     
      display: flex;                 
      justify-content: center;      
      align-items: center;            
      min-height: 100vh;            
    }

    .box {
      background-color: white;      
      padding: 40px;                  
      border-radius: 16px;            
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 400px;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    
    label {
      font-size: 14px;
      color: #555;
      display: block;        
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      outline: none;        
    }

    input:focus {
      border-color: #6c63ff; 
    }
    .btn-row {
      display: flex;
      gap: 8px;               
      margin-bottom: 20px;
    }

    button {
      flex: 1;              
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      border: none;          
      border-radius: 8px;
      cursor: pointer;       
    }

    .btn-add { background-color: #6c63ff; color: white; }
    .btn-sub { background-color: #ff6584; color: white; }
    .btn-mul { background-color: #43aa8b; color: white; }
    .btn-div { background-color: #f8961e; color: white; }

    #result {
      padding: 14px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      background-color: #f5f5f5;
      border: 2px solid #ddd;
      min-height: 52px;      
    }

    #result.success {
      background-color: #d4edda;
      border-color: #28a745;
      color: #155724;
    }

    #result.error {
      background-color: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Basic Calculator</h2>

    
    <label>First Number:</label>
    <input type="number" id="num1" placeholder="Enter first number">

    <label>Second Number:</label>
    <input type="number" id="num2" placeholder="Enter second number">

    <div class="btn-row">
      <button class="btn-add" onclick="calculate('+')">+</button>
      <button class="btn-sub" onclick="calculate('-')">−</button>
      <button class="btn-mul" onclick="calculate('*')">*</button>
      <button class="btn-div" onclick="calculate('/')">/</button>
    </div>

    <div id="result">Result will appear here...</div>
</div>

  <script>
    function calculate(operator) {

      let resultBox = document.getElementById("result");

      let value1 = document.getElementById("num1").value;
      let value2 = document.getElementById("num2").value;

      if (value1 === "" || value2 === "") {
      
        resultBox.innerHTML = " Please enter both numbers!";
        
        resultBox.className = "error";
      
        return;
      }

      let n1 = Number(value1);
      let n2 = Number(value2);

      let answer;

      if (operator === "+") {
        answer = n1 + n2;   

      } else if (operator === "-") {
        answer = n1 - n2;    

      } else if (operator === "*") {
        answer = n1 * n2;     

      } else if (operator === "/") {
        
        if (n2 === 0) {
          resultBox.innerHTML = " Cannot divide by zero!";
          resultBox.className = "error";
          return;
        }
        answer = n1 / n2;   
      }
      resultBox.innerHTML = n1 + " " + operator + " " + n2 + " = " + answer;
    
      resultBox.className = "success";

    } 
  </script>

</body>
</html>
