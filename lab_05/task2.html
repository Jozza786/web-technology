<!DOCTYPE html>
<html>
<head>
  <title>Task 2 - Number Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background-color: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 380px;
    }

    h2 { color: #333; margin-bottom: 20px; }

    label {
      font-size: 14px;
      color: #555;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      outline: none;
    }

    input:focus { border-color: #f8961e; }

    button {
      width: 100%;
      padding: 13px;
      font-size: 16px;
      font-weight: bold;
      background-color: #f8961e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #result {
      padding: 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      background-color: #f5f5f5;
      border: 2px solid #ddd;
      min-height: 56px;
      line-height: 1.6;
    }

    #result.positive {
      background-color: #d4edda;
      border-color: #28a745;
      color: #155724;
    }

    #result.negative {
      background-color: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }

    #result.zero {
      background-color: #e2e3e5;
      border-color: #6c757d;
      color: #383d41;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2> Number Checker</h2>
    <label>Enter any number (positive, negative, zero):</label>
    <input type="number" id="myNumber" placeholder="e.g. -5 or 12 or 0">
    <button onclick="checkNumber()">Check Number</button>
    <div id="result">Your result will appear here...</div>
  </div>
  <script>
   
    function checkNumber() {
      let inputBox = document.getElementById("myNumber");
      let resultBox = document.getElementById("result");

      let inputValue = inputBox.value;

      if (inputValue === "") {
        alert(" Please enter a number first!");
        return;
      }

      let num = Number(inputValue);
      let evenOdd;
      if (num % 2 === 0) {
        evenOdd = "Even";
      } else {
        evenOdd = "Odd";
      }

      if (num > 0) {
        resultBox.innerHTML =  num + " is Positive and " + evenOdd;
        resultBox.className = "positive";
      } else if (num < 0) {
        
        resultBox.innerHTML = num + " is Negative and " + evenOdd;
        resultBox.className = "negative";   

      } else {
        resultBox.innerHTML =  num + " is Zero and " + evenOdd;
        resultBox.className = "zero";      
      }

    } 
  </script>

</body>
</html>
