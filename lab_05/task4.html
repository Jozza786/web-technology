<!DOCTYPE html>
<html>
<head>
  <title>Task 4 - Array of Student Objects</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #d2d2ec;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .box {
      background-color: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 520px;
    }

    h2 { color: #333; margin-bottom: 6px; }
    p.subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }

    table {
      width: 100%;
      border-collapse: collapse;   
      margin-bottom: 24px;
    }

    thead tr {
      background-color: #6c63ff;
      color: white;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 14px;
    }

    tbody tr {
      border-bottom: 1px solid #eee;  
    }

    tbody tr:nth-child(even) {
      background-color: #f8f8ff;
    }

    tbody td {
      padding: 12px 16px;
      font-size: 15px;
      color: #444;
    }

    .marks-bar {
      height: 8px;
      background-color: #e9ecef;
      border-radius: 4px;
      margin-top: 4px;
    }
    .marks-fill {
      height: 100%;
      border-radius: 4px;
      background-color: #6c63ff;
    }

    .stats-row {
      display: flex;
      gap: 16px;
    }

    .stat-box {
      flex: 1;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-box.avg {
      background-color: #e8f5e9;
      border: 2px solid #43aa8b;
    }

    .stat-box.top {
      background-color: #fff8e1;
      border: 2px solid #f8961e;
    }

    .stat-box h4 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 8px;
    }

    .stat-box p {
      font-size: 20px;
      font-weight: bold;
      margin: 0;
    }

    .stat-box.avg p { color: #2c7a5a; }
    .stat-box.top p { color: #c9780a; }

    .topper-badge {
      background-color: #fff3cd;
      color: #856404;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Student Results</h2>
    <p class="subtitle">Array of Objects — Student Records</p>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Student Name</th>
          <th>Marks / 100</th>
        </tr>
      </thead>
      <tbody id="student-table-body">
      </tbody>
    </table>

    <div class="stats-row">
      <div class="stat-box avg">
        <h4> Class Average</h4>
        <p id="average-display">--</p>
      </div>
      <div class="stat-box top">
        <h4> Top Student</h4>
        <p id="topper-display">--</p>
      </div>
    </div>
  </div>
  <script>
    let students = [
      { name: "Ali",   marks: 85 },
      { name: "Jozza",  marks: 92 },
      { name: "Ahmed", marks: 78 }
    ];
    
    let totalMarks = 0;  
    let tableBody = document.getElementById("student-table-body");
    for (let i = 0; i < students.length; i++) {

      totalMarks = totalMarks + students[i].marks;

      let rowHTML = "<tr>";
      rowHTML += "<td>" + (i + 1) + "</td>";          
      rowHTML += "<td>" + students[i].name + "</td>";   
      rowHTML += "<td>";
      rowHTML +=   students[i].marks + " / 100";         
      
      rowHTML +=   "<div class='marks-bar'><div class='marks-fill' style='width:" + students[i].marks + "%'></div></div>";
      rowHTML += "</td>";
      rowHTML += "</tr>";

      tableBody.innerHTML += rowHTML;
    }
   
    let average = totalMarks / students.length;
    document.getElementById("average-display").innerHTML = average.toFixed(2);



    let topper = students[0]; 

    for (let i = 1; i < students.length; i++) {
     
      if (students[i].marks > topper.marks) {
        topper = students[i]; 
      }
    }

   
    document.getElementById("topper-display").innerHTML = topper.name;

    let allRows = tableBody.getElementsByTagName("tr");

    for (let i = 0; i < allRows.length; i++) {
 
      if (students[i].name === topper.name) {
        
        let nameCell = allRows[i].getElementsByTagName("td")[1];
        nameCell.innerHTML += "<span class='topper-badge'> Topper</span>";
      }
    }

  </script>

</body>
</html>
