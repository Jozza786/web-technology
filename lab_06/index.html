<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="app">

    <div class="title-area">
      <h1>Weather</h1>
      <p>Search any city in the world</p>
    </div>

    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="e.g. London, Lahore, Tokyo..." />
      <button id="searchBtn">Search</button>
    </div>
    <div id="lastSearched" class="last-searched hidden">
      Last searched: <span id="lastCity"></span>
      <button id="reloadBtn">Search again</button>
    </div>

    <div id="errorBox" class="error-box hidden">
      ⚠️ City not found. Please check the spelling.
    </div>

    <div id="loadingBox" class="loading-box hidden">
      <div class="spinner"></div>
      <p>Getting weather...</p>
    </div>
    <div id="weatherCard" class="weather-card hidden">

      <div class="card-header">
        <div>
          <div id="cityName" class="city-name"></div>
          <div id="condition" class="condition"></div>
        </div>
        <div id="weatherIcon" class="weather-icon"></div>
      </div>

      <div id="tempValue" class="temperature"></div>

      <div class="details">
        <div class="detail-box">
          <span>💧</span>
          <span class="detail-label">Humidity</span>
          <span id="humidity" class="detail-value"></span>
        </div>
        <div class="detail-box">
          <span>🌬️</span>
          <span class="detail-label">Wind</span>
          <span id="wind" class="detail-value"></span>
        </div>
        <div class="detail-box">
          <span>🌡️</span>
          <span class="detail-label">Feels Like</span>
          <span id="feelsLike" class="detail-value"></span>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
