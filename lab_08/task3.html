<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

</head>
<body>
    <body ng-app="" ng-init="employees=[
  {name:'Ahmad', dept:'IT'},
  {name:'Jozza',  dept:'HR'},
  {name:'Ali',   dept:'Finance'},
  {name:'Adeena',  dept:'Marketing'},
  {name:'Zarnaina',  dept:'Operations'}
]">
  <h2>Employee List</h2>
  <ul>
    <li ng-repeat="emp in employees">
      {{emp.name}} — {{emp.dept}}
    </li>
  </ul>
</body>
</body>
</html>
