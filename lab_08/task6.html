<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
    <body ng-app="">
  <h2>Login</h2>
  <input type="text" ng-model="user" placeholder="Username"><br><br>
  <input type="password" ng-model="pass" placeholder="Password"><br><br>
  <button ng-click="submitted=true">Login</button>

  <p ng-show="submitted && user=='jozza786' && pass=='1234'"
     style="color:green">
    Login Successful!
  </p>
  <p ng-show="submitted && !(user=='jozza786' && pass=='1234')"
     style="color:red">
    Invalid Credentials
  </p>
</body>

</html>
